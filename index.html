<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numaratör</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: white;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  #num {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40vw;
    font-weight: bold;
    color: black;
    z-index: 10;
    pointer-events: none;
  }

  /* görünmeyen alanlar */
  .zone {
    position: absolute;
    top: 0;
    height: 100%;
    width: 50%;
  }

  #leftZone {
    left: 0;
  }

  #rightZone {
    right: 0;
  }
</style>
</head>

<body>

<div id="num">1</div>

<div id="leftZone" class="zone"></div>
<div id="rightZone" class="zone"></div>

<audio id="ding" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
let num = 1;
const max = 96;

const display = document.getElementById("num");
const sound = document.getElementById("ding");

function playSound() {
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

function update() {
  display.textContent = num;
  playSound();
}

function next() {
  num++;
  if (num > max) num = 1;
  update();
}

function prev() {
  num--;
  if (num < 1) num = max;
  update();
}

// SOL ALAN = GERİ
document.getElementById("leftZone").addEventListener("click", prev);

// SAĞ ALAN = İLERİ
document.getElementById("rightZone").addEventListener("click", next);

// ORTA (herhangi bir yere tıklama fallback)
document.addEventListener("click", function(e) {
  const x = e.clientX;
  const width = window.innerWidth;

  if (x > width / 2) next();
  else prev();
});
</script>

</body>
</html>
