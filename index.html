<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numaratör</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: white;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #num {
      font-size: 40vw;
      font-weight: 700;
      color: black;
      line-height: 1;
    }
  </style>
</head>
<body tabindex="0">

  <div id="num">1</div>

  <audio id="ding" preload="auto">
    <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
  </audio>

  <script>
    let num = 1;
    const min = 1;
    const max = 96;

    const display = document.getElementById("num");
    const sound = document.getElementById("ding");

    function playDing() {
      try {
        sound.currentTime = 0;
        sound.play().catch(() => {});
      } catch (e) {}
    }

    function update() {
      display.textContent = num;
      playDing();
    }

    function next() {
      num++;
      if (num > max) num = min;
      update();
    }

    function prev() {
      num--;
      if (num < min) num = max;
      update();
    }

    function keepFocus() {
      document.body.focus();
    }

    // Sayfa açılınca focus al
    window.addEventListener("load", () => {
      keepFocus();
    });

    // Her tıklamada tekrar focus al
    document.addEventListener("click", () => {
      next();       // Ortadaki tuş mouse click gibi davranırsa ileri atsın
      keepFocus();
    });

    // Tuşları yakala
    document.addEventListener("keydown", function(e) {
      const key = e.key;
      const code = e.keyCode;

      // Tarayıcının varsayılan hareketlerini engelle
      if (
        key === "ArrowRight" || key === "ArrowLeft" ||
        key === "ArrowUp" || key === "ArrowDown" ||
        key === "Enter" || key === "NumpadEnter" ||
        code === 21 || code === 22 || code === 19 || code === 20 ||
        code === 13 || code === 23
      ) {
        e.preventDefault();
      }

      // İleri
      if (key === "ArrowRight" || code === 22) {
        next();
        return;
      }

      // Geri
      if (key === "ArrowLeft" || code === 21) {
        prev();
        return;
      }

      // Ortadaki tuş / Enter
      if (
        key === "Enter" ||
        key === "NumpadEnter" ||
        key === "OK" ||
        code === 13 ||
        code === 23
      ) {
        next();
        return;
      }
    });

    // Focus kaçarsa geri al
    document.addEventListener("mousemove", keepFocus);
    document.addEventListener("mousedown", keepFocus);
    document.addEventListener("touchstart", keepFocus);
  </script>
</body>
</html>
