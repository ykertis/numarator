<script>
function playDinDon() {
  ensureAudio();

  const now = audioCtx.currentTime;

  // 1. ton: "dinnnnn"
  const osc1 = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  osc1.type = "sine";
  osc1.frequency.setValueAtTime(1046.5, now);

  gain1.gain.setValueAtTime(0.0001, now);
  gain1.gain.exponentialRampToValueAtTime(0.22, now + 0.03);
  gain1.gain.exponentialRampToValueAtTime(0.12, now + 0.45);
  gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.95);

  osc1.connect(gain1);
  gain1.connect(audioCtx.destination);
  osc1.start(now);
  osc1.stop(now + 0.95);

  // 2. ton: "doonnnnn"
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = "sine";
  osc2.frequency.setValueAtTime(783.99, now + 0.42);

  gain2.gain.setValueAtTime(0.0001, now + 0.42);
  gain2.gain.exponentialRampToValueAtTime(0.20, now + 0.46);
  gain2.gain.exponentialRampToValueAtTime(0.11, now + 0.95);
  gain2.gain.exponentialRampToValueAtTime(0.0001, now + 1.55);

  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.start(now + 0.42);
  osc2.stop(now + 1.55);
}
</script>
